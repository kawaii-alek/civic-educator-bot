<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Educator Bot | Kenyan Constitution Expert</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="glass-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-scale-balanced"></i>
                <span>Civic Bot</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="active"><i class="fas fa-comment-dots"></i> Chat</a>
                <a href="#"><i class="fas fa-book-open"></i> Constitution</a>
                <a href="#"><i class="fas fa-history"></i> History</a>
                <a href="#"><i class="fas fa-gear"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <p>Knowledge is Power</p>
                <small>Kenyan Civic Education</small>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <div class="status-indicator">
                    <span class="dot pulse"></span>
                    <span>System Online</span>
                </div>
                <h1>Constitutional Expert</h1>
            </header>

            <div id="chat-messages" class="messages-container">
                <div class="message bot-message">
                    <div class="avatar"><i class="fas fa-robot"></i></div>
                    <div class="content">
                        <p>Hello! I am your Kenyan Civic Education expert. How can I help you understand our Constitution today?</p>
                        <span class="timestamp">Just now</span>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Ask anything about the Constitution..." autocomplete="off">
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
        <p>Retrieving Constitutional Context...</p>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
